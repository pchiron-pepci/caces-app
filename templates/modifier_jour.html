{% extends "base.html" %}

{% block title %}Modifier le jour{% endblock %}

{% block content %}

<div style="margin-bottom:24px;">
    <a href="/sessions/{{ session.id }}" style="color:#666; text-decoration:none; font-size:13px;">← Retour à la session</a>
    <h2 style="font-family:'Barlow Condensed',sans-serif; font-size:28px; margin-top:4px;">
        Modifier le jour — {{ jour.type|capitalize }} du {{ jour.date.strftime('%d/%m/%Y') if jour.date else '—' }}
    </h2>
</div>

{% if erreur %}
<div style="background:#ffebee; color:#c62828; padding:12px 16px; border-radius:8px; margin-bottom:16px;">
    {{ erreur }}
</div>
{% endif %}

<div class="card" style="max-width:500px;">
    <div style="padding:32px;">
        <form method="POST" action="/sessions/{{ session.id }}/jours/{{ jour.id }}/modifier">
            <div class="form-grid">
                <div class="form-field">
                    <label>Date *</label>
                    <input type="date" name="date" value="{{ jour.date or '' }}" required>
                </div>
                <div class="form-field">
                    <label>Testeur *</label>
                    <select name="testeur_id">
                        <option value="">-- Choisir --</option>
                        {% for t in testeurs %}
                        <option value="{{ t.id }}" {{ 'selected' if t.id == jour.testeur_id else '' }}>
                            {{ t.nom }} {{ t.prenom }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Sauvegarder</button>
                <a href="/sessions/{{ session.id }}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
