{% extends "base.html" %}
{% block title %}Cartes CACES®{% endblock %}
{% block content %}

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h1 style="font-size:1.5rem; font-weight:700; color:#1a237e;">🪪 Cartes CACES®</h1>
</div>

<div style="display:flex; flex-direction:column; gap:20px;">

    <!-- Émettre une carte -->
    <div class="card" style="padding:0; overflow:hidden;">
        <div style="background:#f0f2f7; border-bottom:1px solid #dde3f0; padding:13px 24px; display:flex; align-items:center; gap:10px;">
            <span style="font-size:18px;">🖨️</span>
            <h2 style="font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; color:#1a237e; margin:0;">Émettre une carte CACES®</h2>
        </div>
        <div style="display:flex; min-height:200px;">

            <!-- Colonne gauche : contrôles -->
            <div style="width:260px; min-width:260px; padding:24px 20px; border-right:2px solid #e8eef8; display:flex; flex-direction:column; gap:20px; background:#fafbff;">
                <div>
                    <label style="font-size:11px; font-weight:700; color:#888; display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.6px;">Stagiaire</label>
                    <select id="sel-stagiaire" style="width:100%; border:1.5px solid #c8d8f0; border-radius:8px; padding:9px 12px; font-size:13px; background:#fff; color:#1a237e; font-weight:600;">
                        <option value="">— Choisir —</option>
                    </select>
                </div>
                <div>
                    <label style="font-size:11px; font-weight:700; color:#888; display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.6px;">Famille</label>
                    <select id="sel-famille" disabled style="width:100%; border:1.5px solid #ddd; border-radius:8px; padding:9px 12px; font-size:13px; background:#f0f0f0; color:#aaa;">
                        <option value="">— —</option>
                    </select>
                </div>
                <button data-action="voir-caces"
                        style="background:#cc0000; color:#fff; border:none; border-radius:8px; padding:10px 0; font-size:13px; font-weight:700; cursor:pointer; width:100%; box-shadow:0 2px 6px rgba(204,0,0,0.2); letter-spacing:0.3px;">
                    🔍 Voir les CACES®
                </button>
            </div>

            <!-- Colonne droite : résultats -->
            <div style="flex:1; padding:24px; overflow-x:auto;">
                <div id="resultats-placeholder" style="display:flex; align-items:center; justify-content:center; height:100%; min-height:140px; color:#bbb; font-size:14px; font-style:italic;">
                    ← Sélectionnez un stagiaire et une famille
                </div>
                <div id="section-caces" style="display:none;">
                    <div id="info-stagiaire" style="margin-bottom:14px;"></div>
                    <div id="tableau-caces" style="overflow-x:auto;"></div>
                    <div style="display:flex; justify-content:flex-end; margin-top:18px;">
                        <button id="btn-emettre" data-action="emettre-carte" data-stag-id="" data-famille=""
                                style="background:#2e7d32; color:#fff; border:none; border-radius:10px; padding:12px 32px; font-size:14px; font-weight:700; cursor:pointer; box-shadow:0 3px 8px rgba(46,125,50,0.28); letter-spacing:0.3px;">
                            🖨️ Générer et imprimer
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Cartes émises -->
    <div class="card" style="padding:0; overflow:hidden;">
        <div style="background:#f0f2f7; border-bottom:1px solid #dde3f0; padding:13px 24px; display:flex; align-items:center; gap:10px;">
            <span style="font-size:18px;">📇</span>
            <h2 style="font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; color:#1a237e; margin:0;">Cartes émises</h2>
        </div>
        <div style="padding:20px;">
            <div id="liste-emises"><p style="color:#718096; text-align:center; padding:24px;">Chargement…</p></div>
        </div>
    </div>

</div>

<!-- Modal motif annulation -->
<div id="modal-motif-carte" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center;">
    <div class="card" style="width:440px; max-width:90%; padding:28px; box-shadow:0 8px 32px rgba(0,0,0,0.18);">
        <h3 style="margin-bottom:12px; font-size:15px; font-weight:700; color:#1a237e;">Motif de l'annulation</h3>
        <textarea id="motif-carte-input" rows="3" placeholder="Motif obligatoire…"
                  style="width:100%; border:1px solid #ddd; border-radius:8px; padding:10px 12px; font-size:14px; resize:vertical; box-sizing:border-box; font-family:inherit;"></textarea>
        <p id="motif-carte-erreur" style="color:#c62828; font-size:12px; min-height:16px; margin:6px 0 12px;">​</p>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
            <button id="btn-motif-carte-annuler" class="btn btn-secondary">Annuler</button>
            <button id="btn-motif-carte-confirmer" class="btn btn-primary">Continuer →</button>
        </div>
    </div>
</div>

<!-- Modal PIN -->
<div id="modal-pin-carte" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center;">
    <div class="card" style="width:320px; padding:28px; box-shadow:0 8px 32px rgba(0,0,0,0.18);">
        <h3 id="pin-carte-titre" style="margin-bottom:16px; font-size:15px; font-weight:700; color:#1a237e;">Confirmation</h3>
        <input type="password" id="pin-carte-input" placeholder="Code PIN admin" maxlength="10"
               style="width:100%; padding:9px 12px; border:1px solid #ddd; border-radius:8px; margin-bottom:8px; font-size:16px; box-sizing:border-box;">
        <p id="pin-carte-erreur" style="color:#c62828; font-size:12px; min-height:16px; margin-bottom:12px;"></p>
        <div style="display:flex; gap:8px;">
            <button id="btn-pin-carte-confirmer" class="btn btn-primary" style="flex:1;">Confirmer</button>
            <button id="btn-pin-carte-annuler" class="btn btn-secondary" style="flex:1;">Annuler</button>
        </div>
    </div>
</div>

<script src="/static/js/cartes_caces.js"></script>
{% endblock %}
