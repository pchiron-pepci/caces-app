<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CACES® Manager — Connexion</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a237e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            max-width: 95vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-circle {
            width: 80px;
            height: 80px;
            background: #1a237e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 36px;
        }
        .logo-title {
            font-size: 24px;
            font-weight: 800;
            color: #1a237e;
            font-family: 'Barlow Condensed', sans-serif;
        }
        .logo-subtitle {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #888;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            color: #333;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #1a237e;
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-login:hover { background: #283593; }
        .error {
            background: #ffebee;
            color: #c62828;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .pepci-badge {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <div class="logo-circle">🏗️</div>
        <div class="logo-title">CACES® Manager</div>
        <div class="logo-subtitle">PEPCI Formation</div>
    </div>

    <div class="error" id="error-msg">Email ou mot de passe incorrect</div>

    <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="votre@email.fr" autocomplete="username">
    </div>
    <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
            onkeydown="if(event.key==='Enter') seConnecter()">
    </div>

    <button class="btn-login" onclick="seConnecter()">Se connecter →</button>

    <div class="pepci-badge">PEPCI Formation © 2025</div>
</div>

<script>
async function seConnecter() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (!email || !password) { 
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('error-msg').textContent = 'Veuillez remplir tous les champs';
        return; 
    }

    const formData = new FormData();
    formData.append('username', email);
    formData.append('password', password);

    const resp = await fetch('/api/auth/token', {
        method: 'POST',
        body: formData
    });

    if (resp.ok) {
        const data = await resp.json();
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('nom', data.nom);
        window.location.href = '/';
    } else {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('error-msg').textContent = 'Email ou mot de passe incorrect';
    }
}
</script>
</body>
</html>
