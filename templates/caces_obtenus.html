{% extends "base.html" %}

{% block title %}CACES® Obtenus{% endblock %}

{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h1 style="font-size:1.5rem; font-weight:700; color:#2d2d2d;">🏆 CACES® Obtenus</h1>
    <button id="btn-refresh" class="btn btn-secondary">🔄 Actualiser</button>
</div>

<div style="display:flex; flex-direction:column; gap:20px;">

    <div class="card" style="padding:0; overflow:hidden;">
        <div style="background:#f0f2f7; border-bottom:1px solid #dde3f0; padding:13px 24px; display:flex; align-items:center; gap:10px;">
            <span style="font-size:18px;">⏳</span>
            <h2 style="font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; color:#2d2d2d; margin:0;">CACES® à valider</h2>
        </div>
        <div class="co-list-wrap">
            <div id="liste-a-valider">
                <p style="color:#718096; text-align:center; padding:24px;">Chargement...</p>
            </div>
        </div>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
        <div style="background:#f0f2f7; border-bottom:1px solid #dde3f0; padding:13px 24px; display:flex; align-items:center; gap:10px;">
            <span style="font-size:18px;">✅</span>
            <h2 style="font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; color:#2d2d2d; margin:0;">CACES® validés</h2>
        </div>
        <div class="co-list-wrap">
            <div style="padding:8px 16px 0;">
                <input type="text" id="recherche-valides" placeholder="Rechercher (nom, famille, catégorie, n°...)"
                   style="width:100%;max-width:420px;padding:8px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;box-sizing:border-box;">
            </div>
            <div id="header-valides"></div>
            <div id="liste-valides">
                <p style="color:#718096; text-align:center; padding:24px;">Chargement...</p>
            </div>
        </div>
    </div>

</div>

<!-- Modal motif annulation -->
<div id="modal-motif" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center;">
    <div class="card" style="width:460px; max-width:90%; padding:28px; box-shadow:0 8px 32px rgba(0,0,0,0.18);">
        <h3 id="motif-titre" style="margin-bottom:14px; font-size:15px; font-weight:700; color:#1a237e;">Motif de l'annulation</h3>
        <label style="font-size:13px; font-weight:600; color:#333; display:block; margin-bottom:6px;">Motif <span style="color:#c62828;">*</span></label>
        <select id="motif-select" style="width:100%; border:1px solid #ddd; border-radius:8px; padding:9px 12px; font-size:14px; box-sizing:border-box; margin-bottom:8px;">
            <option value="">— Choisir —</option>
            <option value="CACES® annulé">CACES® annulé</option>
            <option value="Autre">Autre</option>
        </select>
        <p id="motif-hint" style="font-size:12px; color:#555; margin:0 0 12px; min-height:16px; line-height:1.5;"></p>
        <div id="motif-blocage-section" style="display:none; background:#fff3e0; border:1px solid #ffe0b2; border-radius:8px; padding:12px; margin-bottom:12px;">
            <p style="font-size:12px; font-weight:700; color:#e65100; margin:0 0 8px;">⚠️ Blocage des résultats sources</p>
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer; margin-bottom:6px;">
                <input type="checkbox" id="chk-bloquer-pratique"> <span id="chk-pratique-label">Bloquer le résultat pratique</span>
            </label>
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer;">
                <input type="checkbox" id="chk-bloquer-theorie"> <span id="chk-theorie-label">Bloquer le résultat théorique</span>
            </label>
        </div>
        <label id="motif-detail-label" style="font-size:13px; font-weight:600; color:#333; display:block; margin-bottom:6px;">Détail <span style="color:#888; font-weight:400;">(optionnel)</span></label>
        <textarea id="motif-input" rows="3" placeholder="Précisions éventuelles…"
                  style="width:100%; border:1px solid #ddd; border-radius:8px; padding:10px 12px; font-size:14px; resize:vertical; box-sizing:border-box; font-family:inherit;"></textarea>
        <p id="motif-erreur" style="color:#c62828; font-size:12px; min-height:16px; margin:6px 0 12px;">​</p>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
            <button id="btn-motif-annuler" class="btn btn-secondary">Annuler</button>
            <button id="btn-motif-confirmer" class="btn btn-primary">Continuer →</button>
        </div>
    </div>
</div>

<!-- Modal PIN -->
<div id="modal-pin" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center;">
    <div class="card" style="width:320px; padding:28px; box-shadow:0 8px 32px rgba(0,0,0,0.18);">
        <h3 id="pin-titre" style="margin-bottom:16px; font-size:15px; font-weight:700; color:#1a237e;">Confirmation</h3>
        <input type="password" id="pin-input" placeholder="Code PIN admin" maxlength="10"
               style="width:100%; padding:9px 12px; border:1px solid #ddd; border-radius:8px; margin-bottom:8px; font-size:16px; box-sizing:border-box;">
        <p id="pin-erreur" style="color:#c62828; font-size:12px; min-height:16px; margin-bottom:12px;"></p>
        <div style="display:flex; gap:8px;">
            <button id="btn-pin-confirmer" class="btn btn-primary" style="flex:1;">Confirmer</button>
            <button id="btn-pin-annuler" class="btn btn-secondary" style="flex:1;">Annuler</button>
        </div>
    </div>
</div>

<script src="/static/js/caces_obtenus.js"></script>
{% endblock %}
