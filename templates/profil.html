{% extends "base.html" %}

{% block title %}Mon profil{% endblock %}

{% block content %}

<div style="max-width:500px; margin:0 auto;">
    <h2 style="font-family:'Barlow Condensed',sans-serif; font-size:28px; margin-bottom:24px;">Mon profil</h2>

    <!-- INFOS -->
    <div class="card" style="margin-bottom:16px;">
        <div class="card-header"><h2>Informations</h2></div>
        <div style="padding:16px;">
            <div class="form-field">
                <label>Email</label>
                <input type="email" id="email" placeholder="votre@email.fr">
            </div>
            <button class="btn btn-primary" onclick="sauvegarderEmail()">Sauvegarder l'email</button>
            <div id="email-status" style="margin-top:8px; font-size:13px;"></div>
        </div>
    </div>

    <!-- MOT DE PASSE -->
    <div class="card">
        <div class="card-header"><h2>Changer le mot de passe</h2></div>
        <div style="padding:16px;">
            <div class="form-field">
                <label>Mot de passe actuel</label>
                <input type="password" id="mdp-actuel" placeholder="••••••••">
            </div>
            <div class="form-field">
                <label>Nouveau mot de passe</label>
                <input type="password" id="mdp-nouveau" placeholder="••••••••">
            </div>
            <div class="form-field">
                <label>Confirmer le nouveau mot de passe</label>
                <input type="password" id="mdp-confirm" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="sauvegarderMdp()">Changer le mot de passe</button>
            <div id="mdp-status" style="margin-top:8px; font-size:13px;"></div>
        </div>
    </div>
</div>

<script>
// Charger les infos actuelles
async function chargerProfil() {
    const token = localStorage.getItem('token');
    const resp = await fetch('/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + token }
    });
    if (resp.ok) {
        const data = await resp.json();
        document.getElementById('email').value = data.email;
    }
}

async function sauvegarderEmail() {
    const email = document.getElementById('email').value;
    if (!email) { alert('Email obligatoire !'); return; }

    const resp = await fetch('/api/auth/profil', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email })
    });

    const status = document.getElementById('email-status');
    if (resp.ok) {
        status.style.color = '#2e7d32';
        status.textContent = '✅ Email mis a jour !';
    } else {
        status.style.color = '#c62828';
        status.textContent = '❌ Erreur !';
    }
}

async function sauvegarderMdp() {
    const actuel = document.getElementById('mdp-actuel').value;
    const nouveau = document.getElementById('mdp-nouveau').value;
    const confirm = document.getElementById('mdp-confirm').value;
    const status = document.getElementById('mdp-status');

    if (!actuel || !nouveau) { 
        status.style.color = '#c62828';
        status.textContent = '❌ Tous les champs sont obligatoires !';
        return; 
    }
    if (nouveau !== confirm) { 
        status.style.color = '#c62828';
        status.textContent = '❌ Les mots de passe ne correspondent pas !';
        return; 
    }

    const resp = await fetch('/api/auth/profil', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            mot_de_passe_actuel: actuel,
            nouveau_mot_de_passe: nouveau
        })
    });

    if (resp.ok) {
        status.style.color = '#2e7d32';
        status.textContent = '✅ Mot de passe mis a jour !';
        document.getElementById('mdp-actuel').value = '';
        document.getElementById('mdp-nouveau').value = '';
        document.getElementById('mdp-confirm').value = '';
    } else {
        const data = await resp.json();
        status.style.color = '#c62828';
        status.textContent = '❌ ' + (data.detail || 'Erreur !');
    }
}

chargerProfil();
</script>

{% endblock %}
