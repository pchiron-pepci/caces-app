{% extends "base.html" %}

{% block title %}Gestion des utilisateurs{% endblock %}

{% block content %}

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
    <h2 style="font-family:'Barlow Condensed',sans-serif; font-size:28px;">Utilisateurs</h2>
    <button class="btn btn-primary" onclick="ouvrirAjout()">+ Nouvel utilisateur</button>
</div>

<div class="card">
    <table class="table">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Email</th>
                <th>Role</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tbody-users">
            <tr><td colspan="5" style="text-align:center; color:#888;">Chargement...</td></tr>
        </tbody>
    </table>
</div>

<!-- MODAL AJOUT/MODIF -->
<div id="modal-user" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:16px; padding:32px; width:500px; max-width:95vw;">
        <h2 style="font-family:'Barlow Condensed',sans-serif; font-size:22px; margin-bottom:24px;" id="modal-titre">Nouvel utilisateur</h2>
        <input type="hidden" id="user-id">
        <div class="form-grid">
            <div class="form-field">
                <label>Nom *</label>
                <input type="text" id="user-nom-input" placeholder="NOM">
            </div>
            <div class="form-field">
                <label>Prenom *</label>
                <input type="text" id="user-prenom" placeholder="Prenom">
            </div>
            <div class="form-field">
                <label>Email *</label>
                <input type="email" id="user-email" placeholder="email@pepci.fr">
            </div>
            <div class="form-field">
                <label>Téléphone</label>
                <input type="text" id="user-tel" placeholder="0612345678">
            </div>
            <div class="form-field">
                <label>Role *</label>
                <select id="user-role">
                    <option value="terrain">Formateur / Testeur (terrain)</option>
                    <option value="testeur">Testeur</option>
                    <option value="formateur">Formateur</option>
                    <option value="admin">Administrateur</option>
                    <option value="utilisateur">Utilisateur</option>
                </select>
            </div>
            <div class="form-field" style="grid-column:span 2;">
                <label>Rôle référent</label>
                <input type="text" id="user-referent" placeholder="Ex: Référent technique R482, R486">
            </div>
            <div class="form-field" style="grid-column:span 2;" id="field-mdp">
                <label>Mot de passe *</label>
                <input type="password" id="user-mdp" placeholder="••••••••">
            </div>
        </div>
        <div class="form-actions">
            <button class="btn btn-primary" onclick="sauvegarderUser()">Sauvegarder</button>
            <button class="btn btn-secondary" onclick="fermerModal()">Annuler</button>
        </div>
    </div>
</div>

<!-- MODAL PIN -->
<div id="modal-pin-user" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:16px; padding:32px; width:380px; text-align:center;">
        <h2 style="font-family:'Barlow Condensed',sans-serif; font-size:22px; margin-bottom:8px;">Confirmation</h2>
        <p style="color:#666; margin-bottom:24px;">Code PIN administrateur requis.</p>
        <input type="password" id="pin-input-user" placeholder="••••"
            style="width:100%; text-align:center; font-size:24px; letter-spacing:8px; padding:12px; border:2px solid #e0e0e0; border-radius:10px; margin-bottom:12px;">
        <p id="pin-error-user" style="color:red; font-size:13px; margin-bottom:12px; display:none;">Code PIN incorrect !</p>
        <div style="display:flex; gap:12px; justify-content:center;">
            <button class="btn btn-danger" id="pin-confirm-user-btn">Confirmer</button>
            <button class="btn btn-secondary" onclick="fermerPinUser()">Annuler</button>
        </div>
    </div>
</div>

<script>
// On stocke la liste des utilisateurs dans une variable globale
// pour éviter de repasser des données dans les attributs onclick
let listeUsers = [];

async function chargerUsers() {
    const token = localStorage.getItem('token');
    const resp = await fetch('/api/auth/utilisateurs', {
        headers: { 'Authorization': 'Bearer ' + token }
    });
    if (resp.status === 401) {
        window.location.href = '/login';
        return;
    }
    if (!resp.ok) {
        document.getElementById('tbody-users').innerHTML =
            '<tr><td colspan="5" style="text-align:center; color:#c62828;">Erreur — veuillez vous reconnecter.</td></tr>';
        return;
    }
    listeUsers = await resp.json();
    const tbody = document.getElementById('tbody-users');
    if (listeUsers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#888;">Aucun utilisateur</td></tr>';
        return;
    }
    tbody.innerHTML = listeUsers.map(u => `
        <tr style="opacity:${u.actif ? '1' : '0.5'}">
            <td><strong>${u.nom} ${u.prenom}</strong></td>
            <td>${u.email}</td>
            <td>${u.role === 'admin'
                ? '<span class="badge blue">Admin</span>'
                : u.role === 'terrain'
                    ? '<span class="badge orange">Terrain</span>'
                    : '<span class="badge green">' + u.role.charAt(0).toUpperCase() + u.role.slice(1) + '</span>'}</td>
            <td>${u.actif 
                ? '<span class="badge green">Actif</span>' 
                : '<span class="badge red">Inactif</span>'}</td>
            <td>
                <button class="btn btn-secondary" style="padding:6px 12px; font-size:12px;"
                    onclick="editerUser(${u.id})">Modifier</button>
                ${u.actif
                    ? `<button class="btn btn-danger" style="padding:6px 12px; font-size:12px;"
                        onclick="demanderPinDesactiver(${u.id})">Desactiver</button>`
                    : `<button class="btn btn-secondary" style="padding:6px 12px; font-size:12px;"
                        onclick="reactiverUser(${u.id})">Reactiver</button>`
                }
            </td>
        </tr>
    `).join('');
}

// On récupère les données de l'utilisateur depuis la variable globale
// plutôt que depuis les attributs HTML — ça évite les problèmes avec les accents
function editerUser(id) {
    const u = listeUsers.find(x => x.id === id);
    if (!u) return;
    document.getElementById('modal-titre').textContent = 'Modifier utilisateur';
    document.getElementById('user-id').value = u.id;
    document.getElementById('user-nom-input').value = u.nom;
    document.getElementById('user-prenom').value = u.prenom;
    document.getElementById('user-email').value = u.email;
    document.getElementById('user-tel').value = u.telephone || '';
    document.getElementById('user-role').value = u.role;
    document.getElementById('user-referent').value = u.role_referent || '';
    document.getElementById('user-mdp').value = '';
    document.getElementById('field-mdp').style.display = 'none';
    document.getElementById('modal-user').style.display = 'flex';
}

function ouvrirAjout() {
    document.getElementById('modal-titre').textContent = 'Nouvel utilisateur';
    document.getElementById('user-id').value = '';
    document.getElementById('user-nom-input').value = '';
    document.getElementById('user-prenom').value = '';
    document.getElementById('user-email').value = '';
    document.getElementById('user-tel').value = '';
    document.getElementById('user-role').value = 'testeur';
    document.getElementById('user-referent').value = '';
    document.getElementById('user-mdp').value = '';
    document.getElementById('field-mdp').style.display = 'block';
    document.getElementById('modal-user').style.display = 'flex';
}

function fermerModal() {
    document.getElementById('modal-user').style.display = 'none';
}

async function sauvegarderUser() {
    const id = document.getElementById('user-id').value;
    const nom = document.getElementById('user-nom-input').value;
    const prenom = document.getElementById('user-prenom').value;
    const email = document.getElementById('user-email').value;
    const role = document.getElementById('user-role').value;
    const telephone = document.getElementById('user-tel').value || null;
    const role_referent = document.getElementById('user-referent').value || null;
    const mdp = document.getElementById('user-mdp').value;
    const token = localStorage.getItem('token');

    if (!nom || !prenom || !email) { alert('Nom, prenom et email obligatoires !'); return; }

    if (id) {
        document.getElementById('pin-input-user').value = '';
        document.getElementById('pin-error-user').style.display = 'none';
        document.getElementById('modal-pin-user').style.display = 'flex';
        document.getElementById('pin-confirm-user-btn').onclick = async () => {
            const pin = document.getElementById('pin-input-user').value;
            if (pin !== '1505') {
                document.getElementById('pin-error-user').style.display = 'block';
                return;
            }
            fermerPinUser();
            const resp = await fetch('/api/auth/utilisateurs/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nom, prenom, email, role, telephone, role_referent })
            });
            if (resp.ok) { fermerModal(); chargerUsers(); }
            else alert('Erreur lors de la modification !');
        };
    } else {
        if (!mdp) { alert('Mot de passe obligatoire !'); return; }
        const resp = await fetch('/api/auth/utilisateurs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ nom, prenom, email, role, telephone, role_referent, mot_de_passe: mdp })
        });
        if (resp.ok) { fermerModal(); chargerUsers(); }
        else {
            const data = await resp.json();
            alert('Erreur : ' + (data.detail || 'Inconnue'));
        }
    }
}

function demanderPinDesactiver(id) {
    document.getElementById('pin-input-user').value = '';
    document.getElementById('pin-error-user').style.display = 'none';
    document.getElementById('modal-pin-user').style.display = 'flex';
    document.getElementById('pin-confirm-user-btn').onclick = async () => {
        const pin = document.getElementById('pin-input-user').value;
        if (pin !== '1505') {
            document.getElementById('pin-error-user').style.display = 'block';
            return;
        }
        fermerPinUser();
        const token = localStorage.getItem('token');
        const resp = await fetch('/api/auth/utilisateurs/' + id, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (resp.ok) chargerUsers();
        else alert('Erreur lors de la desactivation !');
    };
}

function fermerPinUser() {
    document.getElementById('modal-pin-user').style.display = 'none';
}

async function reactiverUser(id) {
    document.getElementById('pin-input-user').value = '';
    document.getElementById('pin-error-user').style.display = 'none';
    document.getElementById('modal-pin-user').style.display = 'flex';
    document.getElementById('pin-confirm-user-btn').onclick = async () => {
        const pin = document.getElementById('pin-input-user').value;
        if (pin !== '1505') {
            document.getElementById('pin-error-user').style.display = 'block';
            return;
        }
        fermerPinUser();
        const token = localStorage.getItem('token');
        const resp = await fetch('/api/auth/utilisateurs/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ actif: true })
        });
        if (resp.ok) chargerUsers();
        else alert('Erreur lors de la reactivation !');
    };
}

document.addEventListener('DOMContentLoaded', chargerUsers);
</script>

{% endblock %}
