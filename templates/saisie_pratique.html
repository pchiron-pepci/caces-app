<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saisie pratique — {{ candidat_nom }} {{ candidat_prenom }}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; min-height: 100vh; padding-bottom: 88px; }

#sp-header {
    background: #2d2d2d; color: #fff; padding: 7px 12px;
    position: sticky; top: 0; z-index: 40;
}
#sp-header .sp-hd-line { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
#sp-header .sp-cand { font-size: 14px; font-weight: 700; }
#sp-header .sp-meta { font-size: 11px; color: #cfcfcf; }
#sp-header .sp-mode { font-size: 11px; background:#cc0000; color:#fff; padding:2px 9px; border-radius:11px; display:inline-block; }
#sp-progress-txt { font-size: 11px; color: #cfcfcf; }
#sp-eye-btn { margin-left:auto; }

#sp-content { max-width: 760px; margin: 0 auto; padding: 14px; }

.sp-bloc-titre {
    display:flex; align-items:center; gap:10px; margin: 18px 4px 10px;
    font-size: 13px; font-weight: 700; color:#7a3fb5;
}
.sp-bloc-titre .sp-bloc-line { flex:1; height:1px; background:#d8c8ec; }
.sp-bloc-titre .sp-bloc-label { background:#f0e6fa; color:#7a3fb5; padding:3px 12px; border-radius:12px; white-space:nowrap; }

.sp-theme { background:#fff; border:1px solid #e2e6ee; border-radius:12px; margin-bottom:12px; overflow:hidden; }
.sp-theme-head {
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:12px 14px; cursor:pointer; user-select:none; background:#fafbff;
}
.sp-theme-head .sp-theme-titre { font-size:14px; font-weight:700; color:#2d2d2d; display:flex; align-items:center; gap:8px; min-width:0; }
.sp-theme-head .sp-theme-score { font-size:12px; color:#555; white-space:nowrap; }
.sp-theme-body { padding:6px 10px 10px; display:none; }
.sp-theme.open .sp-theme-body { display:block; }
.sp-chevron { transition: transform .2s; flex-shrink:0; }
.sp-theme.open .sp-chevron { transform: rotate(90deg); }

.sp-pe { padding:10px 6px; border-top:1px solid #f0f2f6; }
.sp-pe:first-child { border-top:none; }
.sp-pe-head { display:flex; align-items:flex-start; gap:8px; margin-bottom:4px; }
.sp-pe-badge { font-size:11px; font-weight:700; color:#185fa5; background:#e6f1fb; border-radius:4px; padding:1px 7px; white-space:nowrap; }
.sp-pe-badge.ko { color:#a32d2d; background:#fceaea; }
.sp-pe-chapeau { font-size:12px; color:#555; font-style:italic; flex:1; line-height:1.4; }

.sp-item { padding:8px 4px; }
.sp-item-lib { font-size:16px; font-weight:600; color:#2d2d2d; line-height:1.45; }
.sp-item-desc { font-size:12px; color:#999; line-height:1.4; padding:3px 0 3px 12px; border-left:2px solid #e2e6ee; margin:4px 0 4px 4px; }
.sp-item-saisie { display:flex; align-items:center; justify-content:flex-end; gap:8px; margin-top:6px; }
.sp-item-bareme { font-size:11px; color:#999; }

.sp-btn-bin { width:40px; height:40px; border-radius:8px; border:1px solid #d0d4dc; background:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; color:#aaa; }
.sp-btn-bin.ok-on { border-color:#1d9e75; background:#e1f5ee; color:#0f6e56; }
.sp-btn-bin.ko-on { border-color:#e24b4a; background:#fceaea; color:#a32d2d; }

.sp-paliers { display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; }
.sp-palier { min-width:38px; height:38px; padding:0 8px; border-radius:8px; border:1px solid #d0d4dc; background:#fff; color:#555; font-size:13px; cursor:pointer; }
.sp-palier.on { border:2px solid #185fa5; background:#e6f1fb; color:#185fa5; font-weight:700; }

.sp-step { display:flex; align-items:center; gap:8px; }
.sp-step button { width:42px; height:42px; border-radius:8px; border:1px solid #c0c4cc; background:#fff; font-size:20px; cursor:pointer; }
.sp-step .sp-step-val { min-width:60px; height:42px; border:1px solid #d0d4dc; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:700; }

.sp-elim { background:#faeeda; border:1px solid #f0c98a; border-radius:12px; padding:12px; margin:14px 0; }
.sp-elim-titre { font-size:13px; font-weight:700; color:#854f0b; display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.sp-elim label { display:flex; align-items:center; gap:10px; padding:7px 0; font-size:13px; color:#2d2d2d; cursor:pointer; }
.sp-elim input { width:20px; height:20px; }

#sp-propo { background:#fff; border:1px solid #e2e6ee; border-radius:12px; padding:14px; margin:14px 0; }
#sp-propo .sp-propo-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:13px; color:#555; }
.sp-verdict { border-radius:8px; padding:10px; text-align:center; font-weight:700; font-size:15px; }
.sp-verdict.ok { background:#e1f5ee; color:#0f6e56; }
.sp-verdict.ko { background:#fceaea; color:#a32d2d; }
.sp-raisons { margin-top:8px; font-size:12px; color:#a32d2d; line-height:1.5; }

#sp-actions {
    position: fixed; bottom: 0; left: 0; right: 0; background:#fff; border-top:1px solid #e2e6ee;
    padding: 12px 14px; display:flex; gap:10px; z-index: 30;
}
#sp-actions button { flex:1; height:46px; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; border:none; }
#sp-btn-enregistrer { background:#fff; border:1px solid #b0b4bc; color:#2d2d2d; }
#sp-btn-valider { background:#1d9e75; color:#fff; }

#sp-toast { position:fixed; top:70px; left:50%; transform:translateX(-50%); background:#2d2d2d; color:#fff; padding:8px 16px; border-radius:8px; font-size:13px; z-index:50; display:none; }
.sp-sync { font-size:11px; color:#cfcfcf; }

#sp-eye-btn { font-size:12px; background:rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.3); padding:5px 10px; border-radius:8px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; margin-top:6px; }
#sp-eye-btn.on { background:#cc0000; border-color:#cc0000; }
.sp-crit { display:none; font-size:12px; color:#854f0b; line-height:1.4; margin:6px 0 2px; padding:6px 9px; background:#faeeda; border-left:3px solid #e0a93f; border-radius:0 6px 6px 0; }
body.sp-show-crit .sp-crit { display:block; }
.sp-crit-ic { display:inline-block; width:15px; height:15px; line-height:15px; text-align:center; background:#e0a93f; color:#fff; border-radius:50%; font-weight:700; font-size:11px; margin-right:3px; }

#sp-danger-zone { max-width:760px; margin:24px auto 40px; padding:0 14px; text-align:center; }
#sp-btn-supprimer { background:#fff; color:#a32d2d; border:1px solid #e0a9a9; border-radius:8px; padding:9px 16px; font-size:13px; font-weight:700; cursor:pointer; }
#sp-btn-supprimer:hover { background:#fcebeb; }
.sp-danger-hint { font-size:11px; color:#999; margin-top:6px; }
#sp-pin-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; display:flex; align-items:center; justify-content:center; padding:16px; }
#sp-pin-modal { background:#fff; border-radius:14px; padding:22px; max-width:380px; width:100%; }
#sp-pin-modal h3 { margin:0 0 10px; font-size:16px; color:#2d2d2d; }
#sp-pin-modal p { font-size:13px; color:#555; line-height:1.5; margin:0 0 14px; }
#sp-pin-input { width:100%; padding:10px; font-size:16px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; }
.sp-pin-actions { display:flex; gap:8px; margin-top:16px; }
.sp-pin-actions button { flex:1; height:44px; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; border:none; }
.sp-pin-actions button[data-action="pin-annuler"] { background:#eee; color:#555; }
#sp-pin-confirm { background:#cc0000; color:#fff; }

.sp-header-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:6px; }
#sp-testeur-band { margin:0 0 8px; padding:12px 16px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; border-top:3px solid; transition:background .2s, border-color .2s; }
#sp-testeur-band.non-selectionne { background:#3a2020; border-top-color:#cc0000; }
#sp-testeur-band.selectionne { background:#1e3320; border-top-color:#2e9e56; }
#sp-testeur-band label { font-size:14px; font-weight:500; color:#fff; }
#sp-testeur-ic { font-size:20px; }
#sp-testeur-select { flex:1; min-width:180px; font-size:14px; padding:8px 10px; border-radius:6px; border:2px solid #cc0000; background:#fff; color:#2d2d2d; font-weight:500; transition:border-color .2s; }
#sp-testeur-band.selectionne #sp-testeur-select { border-color:#2e9e56; }
#sp-testeur-select:focus { outline:2px solid #185fa5; }
</style>
</head>
<body
  data-session-id="{{ session_id }}"
  data-jour-test-id="{{ jour_test_id }}"
  data-stagiaire-id="{{ stagiaire_id }}"
  data-categorie="{{ categorie }}"
  data-famille="{{ recommandation }}">

<div id="sp-header">
    <div class="sp-hd-line">
        <span class="sp-cand">{{ candidat_nom }} {{ candidat_prenom }}</span>
        <span class="sp-meta">{{ recommandation }} · Cat {{ categorie }}</span>
        <span class="sp-mode" id="sp-mode-badge">…</span>
        <span id="sp-progress-txt">…</span>
        <button id="sp-eye-btn" data-action="toggle-criteres" type="button"><span id="sp-eye-ic">&#128065;</span> <span id="sp-eye-label">Critères</span></button>
    </div>
</div>

<div id="sp-content">
    <div id="sp-testeur-band" class="non-selectionne">
        <span id="sp-testeur-ic">&#9888;</span>
        <label for="sp-testeur-select">Testeur habilité :</label>
        <select id="sp-testeur-select"><option value="">— Sélectionner le testeur —</option></select>
    </div>
    <div id="sp-blocs"></div>
    <div id="sp-propo" style="display:none;"></div>
</div>

<div id="sp-actions">
    <button id="sp-btn-enregistrer" data-action="enregistrer">Enregistrer</button>
    <button id="sp-btn-valider" data-action="valider">Valider le résultat</button>
</div>

<div id="sp-danger-zone">
    <button id="sp-btn-supprimer" data-action="supprimer-saisie" type="button">Supprimer cette saisie</button>
    <div class="sp-danger-hint">Action administrateur · efface la saisie et réinitialise le résultat</div>
</div>

<div id="sp-pin-overlay" style="display:none;">
    <div id="sp-pin-modal">
        <h3>Supprimer la saisie</h3>
        <p>Cette action efface définitivement la saisie et remet le résultat à vide. Saisissez le code PIN administrateur.</p>
        <input type="password" id="sp-pin-input" inputmode="numeric" placeholder="PIN administrateur" autocomplete="off">
        <div class="sp-pin-actions">
            <button data-action="pin-annuler" type="button">Annuler</button>
            <button data-action="pin-confirmer" type="button" id="sp-pin-confirm">Confirmer la suppression</button>
        </div>
    </div>
</div>

<div id="sp-toast"></div>

<script src="/static/js/saisie_pratique.js"></script>
</body>
</html>
